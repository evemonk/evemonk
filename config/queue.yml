development:
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "*"
      threads: 3
      processes: 1
      polling_interval: 0.1

production:
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: ["default", "meilisearch"]
      threads: 3
      processes: 1
      polling_interval: 0.1
    - queues: "server_status"
      threads: 1
      processes: 1
      polling_interval: 0.1 # yes, mostly real-time.
    - queues: "pghero"
      threads: 1
      processes: 1
      polling_interval: 0.1 # yes, mostly real-time.
    - queues: "realtime"
      threads: 10
      processes: 1
      polling_interval: 0.1 # yes, mostly real-time.
