production:
  pghero_capture_query_stats:
    class: Pghero::CaptureQueryStatsJob
    schedule: every 5m
  pghero_capture_space_stats:
    class: Pghero::CaptureSpaceStatsJob
    schedule: every day at 2 am
  pghero_clean_query_stats:
    command: "PgHero.clean_query_stats"
    queue: "pghero"
    schedule: every day at 2 am
  pghero_clean_space_stats:
    command: "PgHero.clean_space_stats"
    queue: "pghero"
    schedule: every day at 2 am
  eve_server_status:
    class: Eve::ServerStatusJob
    schedule: every 1m
  eve_alliances:
    class: Eve::UpdateAlliancesJob
    schedule: every week
#  eve_local_alliances:
#    class: Eve::LocalAlliancesJob
#    schedule: every week
